<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title data-i18n="site_title_about">About | Lina Hernandez</title>
		
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=Mr+De+Haviland&display=swap" rel="stylesheet">
		
		<link rel="icon" type="image/png" href="../images/icons/lina-96.png" sizes="96x96" />
		<link rel="icon" type="image/svg+xml" href="../images/icons/lina-favicon.svg" />
		<link rel="shortcut icon" href="../images/icons/lina-favicon.ico" />
		<link rel="apple-touch-icon" sizes="180x180" href="../images/icons/lina-apple.png" />
		<meta name="apple-mobile-web-app-title" content="Lina Hernandez" />
		<link rel="manifest" href="../site.webmanifest" />
		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
		<link rel="stylesheet" href="../style.css">
		<script src="../main.js"></script>
		<script src="../components.js" defer></script>
	</head>
	<body class="about-page">

		<div id="global-nav"></div>

		<main id="main-content-wrapper">
			<header class="about-hero-split">
				<div class="about-text-content">
					<p class="about-heading" data-i18n="about_heading">Behind the Lens</p>
					<div id="bio-content" class="bio-body"></div>
					<div class="signature-block">
						<p class="sign-off" data-i18n="sign_off">Con mucho amor,</p> 
						<p class="signature">Lina Hernandez</p>
					</div>
				</div>
				<div class="about-main-image">
					<img src="../images/about/hero.jpg" alt="Lina Hernandez Portrait">
				</div>
			</header>

			<section class="gallery-wrapper">
				<div id="about-gallery" class="masonry-grid">
					<div id="about-loader" class="gallery-loader">
						<div class="spinner"></div>
						<p data-i18n="loading_text">Curating Collection...</p>
					</div>
				</div>
			</section>
		</main>

		<div id="lightbox" class="lightbox" onclick="closeLightbox()">
			<span class="close-lightbox">&times;</span>
			<div id="lightbox-content-container"></div>
		</div>

		<div id="global-footer"></div>

		<script>
			const gallery = document.getElementById('about-gallery');

			// 1. BIO LOADER: Grabs the text file based on current language
		async function loadAboutGallery() {
		const loader = document.getElementById('about-loader');
		const gallery = document.getElementById('about-gallery');

		try {
			const response = await fetch('../images/about/about-manifest.json');
			if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
			
			const files = await response.json();
			files.sort(() => Math.random() - 0.5);

			files.forEach((fileName, index) => {
    const item = document.createElement('div');
    item.className = 'gallery-item';
    
    if (index % 5 === 0) item.classList.add('tall');
    if (index % 8 === 0) item.classList.add('wide');

    const isVideo = fileName.toLowerCase().endsWith('.mp4') || fileName.toLowerCase().endsWith('.mov');
    const filePath = `../images/about/${fileName}`;

    if (isVideo) {
        // We inject the video AND the play icon div
        item.innerHTML = `
            <video src="${filePath}" muted loop playsinline class="gallery-video"></video>
            <div class="play-overlay-icon"><i class="fas fa-play"></i></div>
        `;
        const video = item.querySelector('video');

        item.onmouseenter = () => video.play().catch(() => {});
        item.onmouseleave = () => {
            video.pause();
            video.currentTime = 0;
        };
    } else {
        const img = document.createElement('img');
        img.src = filePath;
        img.loading = "lazy";
        item.appendChild(img);
    }

    // CLICK TO OPEN (Fixes your "click not working" issue)
    item.onclick = () => openLightbox(filePath, isVideo);

    gallery.appendChild(item);
});
		} catch (error) {
			console.error("Critical Gallery Failure:", error);
		} finally {
			// THIS ALWAYS RUNS: Success or Failure, the loader dies here.
			if (loader) {
				loader.classList.add('loader-hidden');
				console.log("Loader forced to hide.");
			}
		}
	}

	function openLightbox(src, isVideo) {
				const lb = document.getElementById('lightbox');
				const container = document.getElementById('lightbox-content-container');
				container.innerHTML = ''; 

				if (isVideo) {
					const video = document.createElement('video');
					video.src = src;
					video.controls = true;
					video.autoplay = true;
					video.style.maxWidth = '90%';
					container.appendChild(video);
				} else {
					const img = document.createElement('img');
					img.src = src;
					img.style.maxWidth = '90%';
					container.appendChild(img);
				}
				lb.classList.add('active');
			}

			function closeLightbox() {
				document.getElementById('lightbox').classList.remove('active');
				document.getElementById('lightbox-content-container').innerHTML = '';
			}
			
	async function loadBio() {
  		const bioContainer = document.getElementById('bio-content');
   	 	if (!bioContainer) return;

  	  	// 1. Context Detection
   	 	const lang = localStorage.getItem('preferredLang') || 'es';
    	const isSubfolder = window.location.pathname.includes('/about/') || window.location.pathname.includes('/contact/');
    	const basePath = isSubfolder ? '../' : '';

    	try {
        	// 2. Content Fetch (with Cache Buster)
        	const response = await fetch(`bio-${lang}.txt?v=${Date.now()}`);
        
        	if (!response.ok) throw new Error(`Status: ${response.status}`);

        	const text = await response.text();
        	bioContainer.innerText = text;

    	} catch (err) {
        	console.error("Bio Loader Error:", err);
        
        	// 3. Graceful Localized Fallback
        	try {
            	const res = await fetch(`${basePath}translations.json`);
            	const allTrans = await res.json();
            
            	bioContainer.innerText = allTrans[lang]?.['bio_fallback'] || (lang === 'es' ? "Cargando..." : "Loading...");
        	} catch (fallbackErr) {
            	// 4. Absolute Safety Net
            	bioContainer.innerText = lang === 'es' ? "Próximamente..." : "Coming soon...";
        	}
    	}
	}

	// Initialize content
	loadBio().catch(err => console.error("Bio failed but moving on...", err));
	loadAboutGallery().catch(err => console.error("Gallery failed but moving on...", err));
	window.addEventListener('languageChanged', loadBio);
	// Listen for language changes to reload the bio file
	window.addEventListener('languageChanged', () => {
		loadBio();
	});

			// 2. THE "START BUTTON" (Place this at the very end)
   // document.addEventListener("DOMContentLoaded", () => {
        // Call them separately so one crash doesn't kill the other
       // loadBio().catch(err => console.error("Bio failed but moving on...", err));
        //loadAboutGallery().catch(err => console.error("Gallery failed but moving on...", err));
    //})
		</script>
	</body>
</html>
