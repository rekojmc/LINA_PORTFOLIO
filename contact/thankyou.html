<!DOCTYPE html>
<html lang="en">
<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title data-i18n="site_title_contact">Contact | Lina Hernandez</title>
		
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;1,400&family=Inter:wght@300;400;600&family=Mr+De+Haviland&display=swap" rel="stylesheet">
		
		<link rel="stylesheet" href="../style.css">
		<link rel="icon" type="image/png" href="../images/icons/lina-96.png" sizes="96x96" />
		<link rel="icon" type="image/svg+xml" href="../images/icons/lina-favicon.svg" />
		<link rel="shortcut icon" href="../images/icons/lina-favicon.ico" />
		<link rel="apple-touch-icon" sizes="180x180" href="../images/icons/lina-apple.png" />
		<meta name="apple-mobile-web-app-title" content="Lina Hernandez" />
		<link rel="manifest" href="../site.webmanifest" />
		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
		<script src="main.js"></script>
		<script src="/components.js" defer></script>

</head>
<body class="thank-you-page">
    <div class="thank-you-bg-wrap">
        <div class="content-overlay"></div>

        <main class="thank-you-content">
            <h1 class="main-title" data-i18n="thank_you_header">THANK YOU</h1>
            
            <p class="thank-you-body" data-i18n="thank_you_body">
                I appreciate your email. I will responding as soon as possible. <br>
                I look forward to colaborating with you.
            </p>

            <p class="signature">Lina Hernandez</p>

            <p class="redirect-info">
                <a href="../index.html" class="back-link-gold" data-i18n="thank_you_redirect">redirecting to Lina's Portfolio</a> 
                <span id="redirect-counter">in 10 seconds...</span>
            </p>
            

        </main>
    </div>

    <script>
        async function initThankYouPage() {
            const lang = localStorage.getItem('preferredLang') || 'en';
            const counterEl = document.getElementById('redirect-counter');
            
            // 1. Load Translations
            try {
                const response = await fetch('/translations.json');
                const allTrans = await response.json();
                const trans = allTrans[lang];

                // 2. Apply Translations to elements with data-i18n
                document.querySelectorAll('[data-i18n]').forEach(el => {
                    const key = el.getAttribute('data-i18n');
                    if (trans[key]) el.innerText = trans[key];
                });

                // 3. Start the Redirect Countdown
                let secondsLeft = 10;
                
                const timer = setInterval(() => {
                    secondsLeft--;
                    
                    // Update the counter string, replacing {sec} if you use that pattern, 
                    // or just updating the span.
                    const countdownTemplate = trans['thank_you_countdown'] || "in {sec} seconds...";
                    counterEl.textContent = countdownTemplate.replace('{sec}', secondsLeft);

                    if (secondsLeft <= 0) {
                        clearInterval(timer);
                        window.location.href = '../index.html';
                    }
                }, 1000);

            } catch (err) {
                console.error("Translation Error:", err);
                // Fallback: If translations fail, just start the 10s redirect anyway
                setTimeout(() => { window.location.href = '../index.html'; }, 10000);
            }
        }

        // Run the initialization
        document.addEventListener('DOMContentLoaded', initThankYouPage);
    </script>
</body>
