<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title data-i18n="site_title_contact">Contact | Lina Hernandez</title>
		
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;1,400&family=Inter:wght@300;400;600&family=Mr+De+Haviland&display=swap" rel="stylesheet">
		
		<link rel="stylesheet" href="../style.css">
		<link rel="icon" type="image/png" href="../images/icons/lina-96.png" sizes="96x96" />
		<link rel="icon" type="image/svg+xml" href="../images/icons/lina-favicon.svg" />
		<link rel="shortcut icon" href="../images/icons/lina-favicon.ico" />
		<link rel="apple-touch-icon" sizes="180x180" href="../images/icons/lina-apple.png" />
		<meta name="apple-mobile-web-app-title" content="Lina Hernandez" />
		<link rel="manifest" href="../site.webmanifest" />
		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
		<script src="../main.js"></script>
		<script src="../components.js" defer></script>
	</head>
	<body class="contact-page">

		<div id="global-nav"></div>

		<main class="contact-hero-overlay">
			<div class="contact-glass-card">
				<h1 class="contact-heading" data-i18n="contact_heading">Contact Lina</h1>
				
				<p id="contact-intro-content" class="contact-intro"></p>

				<form id="lina-contact-form" class="lina-form">
					<input type="text" name="name" data-i18n="form_name" placeholder="YOUR NAME" required>
					<input type="email" name="email" data-i18n="form_email" placeholder="YOUR EMAIL ADDRESS" required>
					<input type="text" name="reason" data-i18n="form_reason" placeholder="REASON" required>
					<textarea name="message" data-i18n="form_message" placeholder="YOUR MESSAGE" rows="5" required></textarea>
					
					<button type="submit" id="submit-btn" class="send-btn" data-i18n="form_submit">SEND MESSAGE</button>
					<div id="form-feedback" style="margin-top: 15px; font-weight: 600;"></div>
				</form>
			</div>
		</main>

		<div id="global-footer"></div>
<script>
    // 1. INTRO LOADER: Grabs text from the local folder
    async function loadContactIntro() {
        const introContainer = document.getElementById('contact-intro-content');
        if (!introContainer) return;

        const lang = localStorage.getItem('preferredLang') || 'en';
        const isSubfolder = window.location.pathname.includes('/contact/');
        const basePath = isSubfolder ? '../' : '';

        try {
            // Fetch the Intro file from the SAME folder as this page
            const response = await fetch(`intro-${lang}.txt?v=${Date.now()}`);
            if (!response.ok) throw new Error('Intro file missing');
            const text = await response.text();
            introContainer.innerText = text;

        } catch (err) {
            console.error("Intro Load Error:", err);
            try {
                const res = await fetch(`${basePath}translations.json`);
                const allTrans = await res.json();
                introContainer.innerText = allTrans[lang]?.['intro_fallback'] || 
                                         (lang === 'es' ? '¡Conectemos!' : "Let's connect!");
            } catch (fErr) {
                introContainer.innerText = lang === 'es' ? '¡Hablemos!' : "Let's connect!";
            }
        }
    }

    // 2. FORM SUBMISSION: Handles the Google Apps Script logic
    document.getElementById('lina-contact-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const btn = document.getElementById('submit-btn');
        const feedback = document.getElementById('form-feedback');
        const lang = localStorage.getItem('preferredLang') || 'en';

        // Detect paths for redirect and translations
        const isSubfolder = window.location.pathname.includes('/contact/');
        const basePath = isSubfolder ? '../' : '';

        // 1. Fetch translation strings for the button/feedback
        let trans;
        try {
            const responseTrans = await fetch(`${basePath}translations.json`);
            const allTrans = await responseTrans.json();
            trans = allTrans[lang];
        } catch (err) {
            trans = { form_sending: "...", form_submit: "SEND" };
        }

        btn.disabled = true;
        btn.textContent = trans['form_sending'] || "Sending..."; 
        feedback.textContent = ""; 

        const params = new URLSearchParams();
        for (const pair of new FormData(this)) {
            params.append(pair[0], pair[1]);
        }
        params.append('browser_language', lang); 

        try {
            const googleScriptUrl = 'https://script.google.com/macros/s/AKfycby8BlsXmPVmFu4kFRH5LTeu8o57RZiWXKQjjkd6eonTS0RkGwaq4hJZ9d47b9jh_m7e/exec';

            await fetch(googleScriptUrl, {
                method: 'POST',
                body: params,
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
            });

            // SUCCESS: Redirect to root-level Thank You page
            window.location.href = `${basePath}thankyou.html`;

        } catch (err) {
            console.error("Form Submission Error:", err);
            feedback.style.color = "#ff6b6b";
            feedback.textContent = trans['form_error'] || "Error sending message.";
            btn.disabled = false;
            btn.textContent = trans['form_submit'] || "SEND MESSAGE";
        }
    });

    // 3. INITIALIZE & LISTEN
    loadContactIntro();
    window.addEventListener('languageChanged', loadContactIntro);
</script>
	</body>
</html>
